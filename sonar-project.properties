# SonarQube Configuration — DocuQuery RAG
# Docs: https://docs.sonarsource.com/sonarqube-server/latest/project-administration/analysis-scope/

sonar.projectKey=docuquery-rag
sonar.projectName=DocuQuery RAG
sonar.organization=your-org-name

# Source directories
sonar.sources=backend/src,frontend/src
sonar.tests=backend/tests,frontend/src

# Exclusions
sonar.exclusions=**/node_modules/**,**/__pycache__/**,**/migrations/**,**/generated/**,**/*.min.js,**/*.min.css
sonar.coverage.exclusions=**/tests/**,**/__init__.py,frontend/src/main.tsx

# Python coverage
sonar.python.coverage.reportPaths=backend/coverage.xml
sonar.python.version=3.12

# TypeScript/JavaScript coverage
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8

# Quality Gate thresholds (documented here; configure in SonarQube UI)
# - Coverage ≥ 80%
# - Duplication ≤ 3%
# - 0 new vulnerabilities
# - 0 new security hotspots
# - Cognitive complexity ≤ 15 per function
